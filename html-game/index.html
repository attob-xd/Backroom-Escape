<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Backrooms: Level 0 - Multiplayer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    #game-container { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; }
    
    /* UI Overlays */
    .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10,9,5,0.92); z-index: 10; }
    .hidden { display: none !important; }
    
    /* Lobby System */
    #lobby-screen { background: #0a0905; }
    .lobby-panel { background: #171410; border: 1px solid #ffae4433; padding: 2rem; border-radius: 4px; max-width: 500px; width: 90%; }
    .lobby-title { color: #ffe6aa; font-size: 1.5rem; letter-spacing: 0.3em; margin-bottom: 1.5rem; text-align: center; }
    .input-group { margin-bottom: 1rem; }
    .input-group label { display: block; color: #ffae4488; font-size: 0.75rem; letter-spacing: 0.2em; margin-bottom: 0.5rem; }
    .input-group input { width: 100%; padding: 0.75rem; background: #0a0905; border: 1px solid #ffae4444; color: #ffe6aa; font-family: inherit; font-size: 0.9rem; }
    .input-group input:focus { outline: none; border-color: #ffae44; }
    .btn { background: #ffae44cc; color: #000; border: none; padding: 0.75rem 2rem; font-family: inherit; font-size: 0.9rem; letter-spacing: 0.2em; cursor: pointer; transition: all 0.2s; }
    .btn:hover { background: #ffe6aa; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: transparent; border: 1px solid #ffae4444; color: #ffae4488; }
    .btn-secondary:hover { border-color: #ffae44; color: #ffae44; }
    
    .player-list { margin: 1.5rem 0; max-height: 200px; overflow-y: auto; }
    .player-item { display: flex; justify-content: space-between; padding: 0.5rem; border-bottom: 1px solid #ffae4422; color: #ffae4488; font-size: 0.8rem; }
    .player-item.host { color: #ffae44; }
    .player-item.you { color: #fff; }
    
    .status-msg { color: #ff6b6b; font-size: 0.8rem; margin-top: 1rem; text-align: center; }
    .connection-status { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; font-size: 0.75rem; color: #ffae4488; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff6b6b; }
    .status-dot.connected { background: #51cf66; }
    .status-dot.connecting { background: #fcc419; animation: pulse 1s infinite; }
    
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    
    /* In-game HUD */
    #hud { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
    .hud-element { position: absolute; color: #ffe6aa99; font-size: 0.8rem; letter-spacing: 0.2em; }
    .objective { left: 20px; top: 20px; color: #ffe6aaff; text-shadow: 0 0 14px rgba(255,225,150,0.5); }
    .pages { bottom: 20px; left: 20px; }
    .stamina-bar { position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); width: 176px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    .stamina-fill { height: 100%; background: #ffe6aabb; transition: width 0.15s; }
    .stamina-fill.low { background: #ff6b6bcc; }
    .crosshair { position: absolute; left: 50%; top: 50%; width: 4px; height: 4px; background: #ffe6aa66; border-radius: 50%; transform: translate(-50%, -50%); }
    .prompt { position: absolute; bottom: 28%; left: 50%; transform: translateX(-50%); color: #ffe6aaee; font-size: 1rem; animation: pulse-text 1s infinite; }
    @keyframes pulse-text { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    
    /* Multiplayer indicators */
    .player-marker { position: absolute; width: 20px; height: 20px; border: 2px solid #4dabf7; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    .player-marker::after { content: attr(data-name); position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; white-space: nowrap; color: #4dabf7; }
    
    /* Chat */
    #chat-container { position: absolute; bottom: 80px; left: 20px; width: 300px; z-index: 6; }
    #chat-messages { max-height: 150px; overflow-y: auto; margin-bottom: 0.5rem; font-size: 0.75rem; }
    .chat-msg { margin-bottom: 0.25rem; color: #ffae4488; }
    .chat-msg .name { color: #4dabf7; }
    #chat-input { width: 100%; padding: 0.5rem; background: rgba(10,9,5,0.8); border: 1px solid #ffae4444; color: #ffe6aa; font-family: inherit; font-size: 0.8rem; }
    
    /* Toast notifications */
    .toast { position: absolute; left: 50%; top: 8%; transform: translateX(-50%); background: rgba(0,0,0,0.8); border: 1px solid #33cc6633; padding: 0.5rem 1.25rem; font-size: 0.75rem; letter-spacing: 0.2em; color: #33cc6699; z-index: 20; }
    
    /* Loading */
    .loading { color: #ffae4488; font-size: 0.9rem; letter-spacing: 0.2em; }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>
  
  <!-- Lobby Screen -->
  <div id="lobby-screen" class="overlay">
    <div class="lobby-panel">
      <h1 class="lobby-title">BACKROOMS<br><span style="font-size:0.6em;letter-spacing:0.15em;color:#ffae4466">MULTIPLAYER</span></h1>
      
      <div class="connection-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Disconnected</span>
      </div>
      
      <div class="input-group">
        <label>YOUR NAME</label>
        <input type="text" id="player-name" placeholder="Enter your name" maxlength="20">
      </div>
      
      <div class="input-group">
        <label>ROOM CODE (optional)</label>
        <input type="text" id="room-code" placeholder="Leave empty to create new room" maxlength="6" style="text-transform:uppercase;">
      </div>
      
      <div style="display:flex;gap:1rem;justify-content:center;">
        <button class="btn" id="join-btn">JOIN / CREATE</button>
      </div>
      
      <div class="player-list" id="player-list">
        <div class="player-item" style="justify-content:center;color:#ffae4444;">No players yet</div>
      </div>
      
      <p class="status-msg" id="status-msg"></p>
      
      <div style="margin-top:1.5rem;text-align:center;font-size:0.7rem;color:#ffae4444;letter-spacing:0.1em;">
        Using PeerJS for peer-to-peer multiplayer
      </div>
    </div>
  </div>
  
  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="hud-element objective" id="objective">COLLECT THE PAGES — 0/8</div>
    <div class="hud-element pages" id="pages-display">PAGES 0/8</div>
    <div class="stamina-bar"><div class="stamina-fill" id="stamina-fill"></div></div>
    <div class="crosshair"></div>
    <div class="prompt hidden" id="prompt"></div>
    <div id="chat-container">
      <div id="chat-messages"></div>
      <input type="text" id="chat-input" placeholder="Press T to chat..." disabled>
    </div>
    <div id="player-markers"></div>
  </div>
  
  <!-- Toast container -->
  <div id="toast-container"></div>
  
  <!-- Game Over screens -->
  <div id="dead-screen" class="overlay hidden" style="background:rgba(24,4,4,0.9);">
    <h2 style="color:#ff6b6bee;font-size:2.5rem;letter-spacing:0.2em;">YOU WERE TAKEN</h2>
    <p style="color:#ff6b6b66;margin-top:1.5rem;font-size:0.8rem;letter-spacing:0.15em;" id="death-stats"></p>
    <button class="btn" style="margin-top:2rem;background:#ff6b6b44;" onclick="location.reload()">TRY AGAIN</button>
  </div>
  
  <div id="win-screen" class="overlay hidden" style="background:rgba(21,19,12,0.85);">
    <h2 style="color:#ffe6aaff;font-size:2.5rem;letter-spacing:0.2em;text-shadow:0 0 50px rgba(255,255,220,0.8);">YOU GOT OUT</h2>
    <p style="color:#ffe6aa99;margin-top:1.5rem;font-size:0.8rem;letter-spacing:0.15em;" id="win-stats"></p>
    <button class="btn" style="margin-top:2rem;" onclick="location.reload()">PLAY AGAIN</button>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="game-multiplayer.js"></script>
</body>
</html>
